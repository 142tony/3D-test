<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 空間邏輯測驗</title>
<style>
  :root {
    --primary-color: #2c3e50;
    --border-color: #bdc3c7;
    --hover-color: #ecf0f1;
  }

  /* 確保所有元素的寬度包含 padding 與 border */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f8f9fa;
    color: var(--primary-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    margin: 0;
  }

  header {
    text-align: center;
    width: 100%;
  }

  h1 { margin-bottom: 10px; }

  /* 題目區域：視圖佈局 */
  .question-container {
    display: flex;
    gap: 40px;
    margin-bottom: 30px;
    padding: 20px 40px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    justify-content: center;
    width: 100%;
    max-width: 600px;
  }

  .view-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .view-box span {
    margin-bottom: 8px;
    font-weight: bold;
  }

  /* 2D 網格繪製 */
  .grid-2d {
    display: grid;
    grid-template-columns: repeat(3, 30px);
    grid-template-rows: repeat(3, 30px);
    gap: 2px;
    background-color: var(--border-color);
    border: 2px solid var(--border-color);
  }

  .grid-cell {
    width: 30px;
    height: 30px;
    background-color: white;
  }

  .grid-cell.filled {
    background-color: var(--primary-color);
  }

  /* 選項區域 */
  .options-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 600px;
  }

  .option-card {
    background: white;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 確保卡片內部元素不會超出邊界 */
    overflow: hidden; 
  }

  .option-card:hover {
    background-color: var(--hover-color);
    border-color: #3498db;
  }

  .option-label {
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 10px;
  }

  canvas {
    width: 200px;
    height: 200px;
    /* 讓 canvas 在小螢幕時能等比例縮小，不會破版 */
    max-width: 100%; 
  }

  /* 控制與回饋區 */
  .controls {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    width: 100%;
  }

  button {
    padding: 12px 24px;
    font-size: 1.1rem;
    cursor: pointer;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 4px;
    transition: background-color 0.2s;
    width: 100%;
    max-width: 300px;
  }

  button:hover { background-color: #2980b9; }

  #feedback {
    font-size: 1.2rem;
    font-weight: bold;
    height: 24px;
    text-align: center;
  }

  .correct { color: #27ae60; }
  .wrong { color: #e74c3c; }

  /* =========================================
     手機版響應式設計 (RWD) 
     當螢幕寬度小於 600px 時觸發
     ========================================= */
  @media (max-width: 600px) {
    body {
      padding: 10px;
    }

    .question-container {
      flex-direction: column;
      gap: 25px;
      padding: 15px;
    }

    .options-container {
      grid-template-columns: 1fr;
      gap: 15px;
    }

    button {
      padding: 15px 20px;
    }
  }
</style>
</head>
<body>

  <header>
    <h1>空間關係測驗</h1>
    <p>根據下方的「俯視圖」與「左後側視圖」，選出正確的 3D 立體圖形。</p>
  </header>

  <main style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <section class="question-container">
      <div class="view-box">
        <span>俯視圖</span>
        <div id="topViewGrid" class="grid-2d"></div>
      </div>
      <div class="view-box">
        <span>左後側視圖</span>
        <div id="rightViewGrid" class="grid-2d"></div>
      </div>
    </section>

    <section class="options-container" id="optionsContainer">
      </section>
  </main>

  <footer class="controls">
    <div id="feedback"></div>
    <button id="nextBtn" onclick="initGame()">產生下一題</button>
  </footer>

<script>
  const GRID_SIZE = 3;
  const MAX_HEIGHT = 3;
  let currentCorrectAnswerIndex = -1;

  // --- 1. 核心邏輯：生成與分析圖形 ---

  const generateRandomShape = () => {
    const shape = [];
    let hasBlocks = false;
    
    for (let z = 0; z < GRID_SIZE; z++) {
      const row = [];
      for (let x = 0; x < GRID_SIZE; x++) {
        const height = Math.random() > 0.3 ? Math.floor(Math.random() * (MAX_HEIGHT + 1)) : 0;
        row.push(height);
        if (height > 0) hasBlocks = true;
      }
      shape.push(row);
    }
    
    return hasBlocks ? shape : generateRandomShape();
  };

  const getTopView = (shape) => {
    const view = [];
    for (let z = 0; z < GRID_SIZE; z++) {
      const row = [];
      for (let x = 0; x < GRID_SIZE; x++) {
        row.push(shape[z][x] > 0 ? 1 : 0);
      }
      view.push(row);
    }
    return view;
  };

  const getRightView = (shape) => {
    const view = Array(MAX_HEIGHT).fill(0).map(() => Array(GRID_SIZE).fill(0));
    
    for (let z = 0; z < GRID_SIZE; z++) {
      let maxHeightInRow = 0;
      for (let x = 0; x < GRID_SIZE; x++) {
        if (shape[z][x] > maxHeightInRow) {
          maxHeightInRow = shape[z][x];
        }
      }
      for (let y = 0; y < maxHeightInRow; y++) {
        view[(MAX_HEIGHT - 1) - y][z] = 1; 
      }
    }
    return view;
  };

  // --- 2. 視圖渲染 (DOM 操作) ---

  const render2DGrid = (elementId, viewMatrix) => {
    const container = document.getElementById(elementId);
    if (!container) return;
    
    container.innerHTML = '';
    
    const rows = viewMatrix.length;
    const cols = viewMatrix[0].length;
    container.style.gridTemplateColumns = `repeat(${cols}, 30px)`;
    container.style.gridTemplateRows = `repeat(${rows}, 30px)`;

    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell' + (viewMatrix[i][j] ? ' filled' : '');
        container.appendChild(cell);
      }
    }
  };

  // --- 3. Isometric (等角投影) Canvas 實心實體繪製核心 ---

  const renderIsometricShape = (canvasElement, shape) => {
    if (!canvasElement) return;
    
    const ctx = canvasElement.getContext('2d');
    if (!ctx) return;

    const width = canvasElement.width;
    const height = canvasElement.height;
    
    ctx.clearRect(0, 0, width, height);
    
    const cubeSize = 22; 
    const dx = cubeSize * Math.cos(Math.PI / 6);
    const dy = cubeSize * Math.sin(Math.PI / 6);
    
    const originX = width / 2;
    const originY = height / 2 + 2; 

    // ==========================================
    // 新增：繪製底層九宮格虛線
    // ==========================================
    ctx.save();
    ctx.setLineDash([4, 4]); // 設定為虛線 (長度4, 間距4)
    ctx.strokeStyle = '#bdc3c7'; // 虛線顏色使用淺灰色
    ctx.lineWidth = 1;

    /**
     * 輔助函數：計算 3D 空間中 (x, z) 座標落在 2D 畫布上的點
     * 這個公式對應於方塊(y=0)時，貼齊地面的最深處(後角)頂點
     */
    const getFloorPoint = (gridX, gridZ) => {
      return {
        px: originX + (gridX - gridZ) * dx,
        // - 2 * dy 是為了推算到正方形背後的頂點，+ cubeSize 是降到底部高度
        py: originY + (gridX + gridZ - 2) * dy + cubeSize 
      };
    };

    // 畫 4 條平行的 Z 軸方向底線
    for (let x = 0; x <= GRID_SIZE; x++) {
      ctx.beginPath();
      const start = getFloorPoint(x, 0);
      const end = getFloorPoint(x, GRID_SIZE);
      ctx.moveTo(start.px, start.py);
      ctx.lineTo(end.px, end.py);
      ctx.stroke();
    }

    // 畫 4 條平行的 X 軸方向底線
    for (let z = 0; z <= GRID_SIZE; z++) {
      ctx.beginPath();
      const start = getFloorPoint(0, z);
      const end = getFloorPoint(GRID_SIZE, z);
      ctx.moveTo(start.px, start.py);
      ctx.lineTo(end.px, end.py);
      ctx.stroke();
    }
    ctx.restore(); // 恢復畫筆狀態，確保後續的方塊框線不會變成虛線
    // ==========================================

    const drawSolidCube = (x, y, z) => {
      const screenX = originX + (x - z) * dx;
      const screenY = originY - (y * cubeSize) + (x + z) * dy;
      
      // Left Face
      ctx.beginPath();
      ctx.moveTo(screenX, screenY);
      ctx.lineTo(screenX - dx, screenY - dy);
      ctx.lineTo(screenX - dx, screenY - dy + cubeSize);
      ctx.lineTo(screenX, screenY + cubeSize);
      ctx.closePath();
      ctx.fillStyle = '#7f8c8d'; 
      ctx.fill();

      // Right Face
      ctx.beginPath();
      ctx.moveTo(screenX, screenY);
      ctx.lineTo(screenX + dx, screenY - dy);
      ctx.lineTo(screenX + dx, screenY - dy + cubeSize);
      ctx.lineTo(screenX, screenY + cubeSize);
      ctx.closePath();
      ctx.fillStyle = '#bdc3c7'; 
      ctx.fill();

      // Top Face
      ctx.beginPath();
      ctx.moveTo(screenX, screenY);
      ctx.lineTo(screenX + dx, screenY - dy);
      ctx.lineTo(screenX, screenY - 2 * dy);
      ctx.lineTo(screenX - dx, screenY - dy);
      ctx.closePath();
      ctx.fillStyle = '#fbfcfc'; 
      ctx.fill();

      // Edges
      ctx.strokeStyle = '#95a5a6';
      ctx.lineWidth = 0.8;
      ctx.stroke(); 
    };

    for (let y = 0; y < MAX_HEIGHT; y++) {
      for (let depthSum = 0; depthSum <= 2 * (GRID_SIZE - 1); depthSum++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const z = depthSum - x;
          if (z >= 0 && z < GRID_SIZE && shape[z][x] > y) {
            drawSolidCube(x, y, z);
          }
        }
      }
    }
  };

  // --- 4. 遊戲主邏輯 ---

  const handleOptionClick = (selectedIndex) => {
    const feedbackEl = document.getElementById('feedback');
    if (!feedbackEl) return; 

    if (selectedIndex === currentCorrectAnswerIndex) {
      feedbackEl.textContent = '✅ 答對了！非常棒！';
      feedbackEl.className = 'correct';
    } else {
      feedbackEl.textContent = '❌ 答錯了，再仔細觀察一下視圖喔！';
      feedbackEl.className = 'wrong';
    }
  };

  const initGame = () => {
    const feedbackEl = document.getElementById('feedback');
    if (feedbackEl) {
      feedbackEl.textContent = '';
      feedbackEl.className = '';
    }

    const correctShape = generateRandomShape();
    
    render2DGrid('topViewGrid', getTopView(correctShape));
    render2DGrid('rightViewGrid', getRightView(correctShape));

    const options = [correctShape];
    while (options.length < 4) {
      const distractor = generateRandomShape();
      if (JSON.stringify(distractor) !== JSON.stringify(correctShape)) {
        options.push(distractor);
      }
    }

    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }

    currentCorrectAnswerIndex = options.findIndex(
      opt => JSON.stringify(opt) === JSON.stringify(correctShape)
    );

    const optionsContainer = document.getElementById('optionsContainer');
    if (!optionsContainer) return; 
    
    optionsContainer.innerHTML = '';
    const labels = ['(A)', '(B)', '(C)', '(D)'];

    options.forEach((shape, index) => {
      const card = document.createElement('div');
      card.className = 'option-card';
      card.onclick = () => handleOptionClick(index);

      const label = document.createElement('div');
      label.className = 'option-label';
      label.textContent = labels[index];

      const canvas = document.createElement('canvas');
      canvas.width = 200;
      canvas.height = 200;

      card.appendChild(label);
      card.appendChild(canvas);
      optionsContainer.appendChild(card);

      renderIsometricShape(canvas, shape);
    });
  };

  window.onload = initGame;

</script>
</body>
</html>
